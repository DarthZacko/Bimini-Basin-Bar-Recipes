}

}

button {

}

  text-shadow: 0 2px 18px rgba(0,0,0,.35);

}

.brand-subtitle {
  margin: 0 0 22px;
  color: var(--teal);
  font-size: 0.95rem;
  letter-spacing: 1.2px;
  text-transform: uppercase;
}

.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,.28);
  backdrop-filter: blur(4px);
}

button {
  width: 100%;
  padding: 13px 14px;
  margin: 6px 0;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.08);
  background: linear-gradient(180deg, rgba(15, 40, 62, .96), rgba(9, 25, 41, .96));
  color: #f8fafc;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform .08s ease, background .15s ease, border-color .15s ease;
}

button:hover {
  transform: translateY(-1px);
  border-color: rgba(45, 212, 191, .5);
  background: linear-gradient(180deg, rgba(20, 53, 79, .98), rgba(10, 30, 49, .98));
}

button:disabled {
  opacity: .95;
  cursor: default;
}

.correct {
  background: var(--correct) !important;
  border-color: rgba(255,255,255,.18);
}

.wrong {
  background: var(--wrong) !important;
  border-color: rgba(255,255,255,.18);
}

.hidden {
  display: none;
}

.progress {
  height: 10px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 14px;
}

.progress-bar {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, var(--aqua), var(--teal), var(--sunset));
  border-radius: 999px;
  transition: width .2s ease;
}

#counter {
  color: var(--muted);
  margin-bottom: 8px;
  font-size: 0.95rem;
}

#question {
  color: #ffffff;
  margin: 10px 0 14px;
  line-height: 1.35;
}

#explanation {
  margin-top: 12px;
  color: var(--teal);
  font-weight: 600;
  min-height: 24px;
}

.section-title {
  margin: 18px 0 10px;
  color: var(--aqua);
  font-size: .95rem;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.footer-note {
  margin-top: 18px;
  color: var(--muted);
  font-size: .85rem;
}
</style></head>

]

// ================= STATE =================
let set = [];
let q = null;
let index = 0;
let score = 0;
let difficulty = "easy";

let mode = "normal";
let timer = null;
let timeLeft = 30;
let missedQuestions = [];

// ================= MODE FUNCTION =================
function setMode(m){
  mode = m;

  // Remove active from all
  document.getElementById("mode-normal").classList.remove("active-mode");
  document.getElementById("mode-rush").classList.remove("active-mode");
  document.getElementById("mode-review").classList.remove("active-mode");

  // Add active to selected
  document.getElementById("mode-" + m).classList.add("active-mode");

  // Update UI label
  document.getElementById("counter").innerText = "Mode: " + m;
}

// ================= INIT =================
function init(){

  const cats = [...new Set(drinks.map(d=>d.category))];
  const menu = document.getElementById("menu");

  // Difficulty
  ["easy","hard","expert"].forEach(d=>{
    let btn=document.createElement("button");
    btn.innerText="Mode: "+d;
    btn.onclick=()=>difficulty=d;
    menu.appendChild(btn);
  });

  // Categories
  let allBtn=document.createElement("button");
  allBtn.innerText="All Drinks";
  allBtn.onclick=()=>start("all");
  menu.appendChild(allBtn);

  cats.forEach(cat=>{
    let btn=document.createElement("button");
    btn.innerText=cat;
    btn.onclick=()=>start(cat);
    menu.appendChild(btn);
  });
  setMode("normal");
}

// ================= START =================
function start(cat){
  set = cat==="all"?drinks:drinks.filter(d=>d.category===cat);

  index=0;
  score=0;

  document.getElementById("menu").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");

  nextQuestion();
}

// ================= START TIMER ==============
function startTimer(){
  clearInterval(timer);
  timeLeft = 30;

  document.getElementById("counter").innerText =
    `${index}/10 | ⏱ ${timeLeft}s`;

  timer = setInterval(()=>{
    timeLeft--;

    document.getElementById("counter").innerText =
      `${index}/10 | ⏱ ${timeLeft}s`;

    if(timeLeft <= 0){
      clearInterval(timer);
      nextQuestion();
    }
  }, 1000);
}
  
// ================= QUESTION =================
function generate(){

  const drink = set[Math.floor(Math.random()*set.length)];
  const ing = drink.ingredients[Math.floor(Math.random()*drink.ingredients.length)];

  // EASY
  if(difficulty==="easy"){
    return {
      text:`Which ingredient is in ${drink.name}?`,
      correct: ing.name,
      options: generateIngredientOptions(ing.name)
    };
  }

  // HARD
  if(difficulty==="hard"){
    return {
      text:`How many ${ing.unit} of ${ing.name} in ${drink.name}?`,
      correct: ing.amount,
      options: generateAmountOptions(ing.amount)
    };
  }

  // EXPERT
  const correct = drink.ingredients.map(i=>i.name).join(", ");

  return {
    text:`Full recipe for ${drink.name}?`,
    correct,
    options: generateRecipeOptions(correct)
  };
}

// ================= OPTION GENERATORS =================
function generateIngredientOptions(correct){
  let options=[correct];

  while(options.length<4){
    let rand = drinks[Math.floor(Math.random()*drinks.length)];
    let ing = rand.ingredients[Math.floor(Math.random()*rand.ingredients.length)].name;
    if(!options.includes(ing)) options.push(ing);
  }

  return shuffle(options);
}

function generateAmountOptions(correct){
  let base=[0.25,0.5,0.75,1,1.5,2,2.5,3];
  let options=[correct];

  while(options.length<4){
    let fake = base[Math.floor(Math.random()*base.length)];
    if(!options.includes(fake)) options.push(fake);
  }

  return shuffle(options);
}

function generateRecipeOptions(correct){
  let options=[correct];

  while(options.length<4){
    let rand = drinks[Math.floor(Math.random()*drinks.length)];
    let fake = rand.ingredients.map(i=>i.name).join(", ");
    if(!options.includes(fake)) options.push(fake);
  }

  return shuffle(options);
}

// ================= NEXT =================
function nextQuestion(){

  clearInterval(timer);

  if(index >= 10){
    end();
    return;
  }

  q = generate();
  index++;

  document.getElementById("bar").style.width =
    (index / 10 * 100) + "%";

  document.getElementById("question").innerText = q.text;

  const answers = document.getElementById("answers");
  answers.innerHTML = "";

  document.getElementById("explanation").innerText = "";

  q.options.forEach(opt=>{
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = ()=>select(btn,opt);
    answers.appendChild(btn);
  });

  if(mode === "rush"){
    startTimer();
  } else {
    document.getElementById("counter").innerText = `${index}/10`;
  }
}

// ================= SELECT =================
function select(btn,val){

  const buttons=document.querySelectorAll("#answers button");

  buttons.forEach(b=>{
    b.disabled=true;
    if(b.innerText==q.correct) b.classList.add("correct");
  });

  if(val==q.correct){
    score++;
  } else {
    btn.classList.add("wrong");
  }

  document.getElementById("explanation").innerText =
    `Correct: ${q.correct}`;
}

// ================= END =================
function end(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("results").classList.remove("hidden");

  document.getElementById("score").innerText =
    `Score: ${score}/10`;
}

// ================= UTIL =================
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

init();

</script>
